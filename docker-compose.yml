services:
  postgres:
    image: postgres:16-alpine
    container_name: kyl-poc-postgres
    environment:
      POSTGRES_DB: kyl_poc
      POSTGRES_USER: kyl
      POSTGRES_PASSWORD: kyl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyl -d kyl_poc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

